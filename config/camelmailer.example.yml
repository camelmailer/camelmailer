# CamelMailer configuration — copy to camelmailer.yml and point
# CAMELMAILER_CONFIG_FILE_PATH at it. Every key is optional; anything you
# omit falls back to the built-in default. An existing Postal `postal.yml`
# loads unchanged (the `postal:` group is accepted as an alias for
# `camelmailer:`, and POSTAL_CONFIG_FILE_PATH still works).
#
# `$config-file-root` in path values expands to this file's directory.

camelmailer:
  # Public hostnames of this installation.
  web_hostname: mail.example.com
  web_protocol: https
  smtp_hostname: mx.example.com

  # RSA private key (PEM) used for DKIM signatures and webhook signing.
  # Generate one with:  openssl genrsa -out signing.key 2048
  signing_key_path: $config-file-root/signing.key

  # Fallback admin API key (X-Admin-API-Key). Prefer database-backed keys
  # created with `camelmailer make-admin-api-key <name>`.
  # admin_api_key: change-me

  # Deliver through fixed relays instead of direct-to-MX. Direct MX
  # delivery always uses port 25 (that is the protocol); smtp_relays is
  # the way out when your host blocks outbound port 25 (Hetzner, AWS, …).
  # Three URL forms:
  #   smtp://host:25            plaintext + opportunistic STARTTLS
  #   smtp://host:587           submission — STARTTLS enforced (no
  #                             plaintext fallback)
  #   smtps://host:465          implicit TLS from the first byte
  # Credentials (AUTH PLAIN, sent after the TLS handshake) go in the URL;
  # percent-encode special characters:
  #   smtp://user:pass@smarthost.example.com:587
  # smtp_relays: ["smtp://relay.example.com:25"]

  use_ip_pools: false
  default_maximum_delivery_attempts: 18
  default_spam_threshold: 5
  default_spam_failure_threshold: 20

  # Delete stored messages (and their deliveries, opens, clicks and tracking
  # tokens) once they are older than this many days. The worker enforces it
  # hourly. 0 (the default) keeps messages forever — set a positive value to
  # opt in to automatic retention.
  # message_retention_days: 0

  # SSRF guard on outbound webhook / HTTP-route-endpoint requests. On by
  # default: the destination host is resolved and the request refused when it
  # maps to a loopback, private, link-local, unique-local or otherwise
  # non-global address (blocks e.g. http://169.254.169.254/ metadata reads).
  # outbound_ssrf_protection: true
  # Narrow exception — hosts (domains or IP literals) allowed through the guard
  # even when they resolve to an internal address, for deliberate internal
  # webhook/route targets:
  # outbound_allowed_hosts: ["hooks.internal.example.com", "10.0.0.5"]

web_server:
  # Browser origins allowed to call the APIs (CORS). Empty = no CORS.
  # cors_origins:
  #   - https://mail-admin.example.com
  default_port: 5000
  default_bind_address: 127.0.0.1   # containers override via BIND_ADDRESS

smtp_server:
  default_port: 25
  default_bind_address: "::"
  max_message_size: 14              # MB
  # STARTTLS termination:
  # tls_enabled: true
  # tls_certificate_path: $config-file-root/smtp.cert
  # tls_private_key_path: $config-file-root/smtp.key
  # proxy_protocol: true            # behind HAProxy etc.
  # Additional listeners besides default_port (which always speaks plain
  # SMTP with optional STARTTLS). mode "smtp" behaves like default_port;
  # mode "smtps" is implicit TLS from the first byte (port 465) and
  # requires tls_enabled with a certificate. Ports must be distinct.
  # listeners:
  #   - { port: 587, mode: smtp }
  #   - { port: 465, mode: smtps }

postgres:
  # The DATABASE_URL environment variable, when set, takes precedence
  # over everything in this group.
  enabled: true
  host: localhost
  port: 5432
  username: camelmailer
  # password: secret
  database: camelmailer
  pool_size: 10

dns:
  # The DNS names you publish for this installation.
  mx_records:
    - mx.example.com
  spf_include: spf.example.com
  return_path_domain: rp.example.com
  route_domain: routes.example.com
  track_domain: track.example.com
  dkim_identifier: camelmailer
  # Domain-ownership challenge record (brandable). The API looks up a TXT
  # at "<verification_record_label>.<domain>" whose value is
  # "<verification_value_prefix>=<token>".
  verification_record_label: _camelmailer-challenge
  verification_value_prefix: camelmailer-verification

# Optional inbound message inspection (both disabled by default).
rspamd:
  enabled: false
  host: 127.0.0.1
  port: 11334

clamav:
  enabled: false
  host: 127.0.0.1
  port: 2000

# ---------------------------------------------------------------- accounts

# User accounts, sessions and RBAC (see docs/authentication.md).
# Bootstrap the first account with: camelmailer make-user <email> --admin
auth:
  session_timeout_days: 14
  max_login_attempts: 5
  lockout_minutes: 15
  minimum_password_length: 8
  # Any signed-in user may create an organization (becoming its owner);
  # set to false to restrict creation to global admins.
  allow_organization_creation: true
  # Open self-registration (POST /api/v2/auth/register) — enable for public
  # cloud offerings; self-hosters typically leave this off and create
  # accounts via invitations or make-user.
  allow_registration: false
  # Give every brand-new account (registration or SSO auto-provisioning) a
  # starter workspace: an organization "<FirstName>'s Team", a server
  # "production" and — on registration only — an API credential "default"
  # returned once in the register response. Meant for the cloud.
  bootstrap_workspace: false
  invitation_expiry_days: 7
  password_reset_expiry_hours: 2
  # Base URL of your web frontend — used for invitation/reset links and
  # the OIDC post-login redirect.
  # frontend_url: https://mail-admin.example.com
  # Social sign-in providers ("Continue with …" buttons), each served
  # under /api/v2/auth/sso/{id}/… — register the redirect URI
  #   {web_protocol}://{web_hostname}/api/v2/auth/sso/{id}/callback
  # with each provider. type is oidc or github; oidc requires an issuer.
  # Optional per provider: allowed_email_domains, auto_provision (default
  # true). Independent of the enterprise `oidc` group below.
  # sso_providers:
  #   - { id: google,    type: oidc,   name: Google,
  #       issuer: "https://accounts.google.com",
  #       client_id: "…", client_secret: "…" }
  #   - { id: microsoft, type: oidc,   name: Microsoft,
  #       issuer: "https://login.microsoftonline.com/common/v2.0",
  #       client_id: "…", client_secret: "…" }
  #   - { id: github,    type: github, name: GitHub,
  #       client_id: "…", client_secret: "…" }
  # Passkeys (WebAuthn) — sign in with Touch ID / Windows Hello / security
  # keys. rp_id is the domain passkeys are bound to (changing it later
  # invalidates them all); rp_origin is the exact origin of the frontend.
  webauthn:
    enabled: false
    # rp_id: app.camelmailer.com
    # rp_origin: https://app.camelmailer.com
    # rp_name: CamelMailer

# Platform email delivery — the installation sends its own account mail
# (password resets, invitations, welcome mail) through its own sending
# pipeline. Create a mail server on THIS installation with a verified
# sending domain and an API credential, then point this group at it.
# Requires auth.frontend_url for the links in reset/invitation mail.
# When enabled, server_api_key and from_address are required.
app_mail:
  enabled: false
  # API credential (X-Server-API-Key) of a mail server of THIS installation
  # through which platform mail is sent:
  # server_api_key: …
  # from_address: no-reply@example.com   # domain must be verified on that server
  # from_name: CamelMailer

# Stripe billing — for the hosted cloud offering only. Self-hosted
# installations leave this off (the default): no billing endpoints, no
# billing UI in the dashboard. When enabled, stripe_secret_key is
# required; the key is never logged.
billing:
  enabled: false
  # stripe_secret_key: sk_live_…
  # Where the Stripe billing portal returns the user to; defaults to
  # auth.frontend_url when unset.
  # portal_return_url: https://mail-admin.example.com

# OpenID Connect single sign-on (Okta, Entra ID, Google, Keycloak, …).
# Register the redirect URI:
#   {web_protocol}://{web_hostname}/api/v2/auth/oidc/callback
oidc:
  enabled: false
  # name: Okta
  # issuer: https://acme.okta.com
  # identifier: client-id
  # secret: client-secret
  # scopes: [openid, email, profile]
  # auto_provision: true
  # allowed_email_domains: [acme.com]

# SAML 2.0 single sign-on (for IdPs where SAML is the paved path).
# Register the SP with your IdP using the metadata from:
#   {web_protocol}://{web_hostname}/api/v2/auth/saml/metadata
# ACS (response) URL: {web_protocol}://{web_hostname}/api/v2/auth/saml/acs
# Assertions must be signed with idp_certificate (rsa-sha256).
saml:
  enabled: false
  # name: Okta                          # login-page button label
  # idp_sso_url: https://acme.okta.com/app/.../sso/saml
  # idp_certificate: /etc/camelmailer/idp.pem   # or inline PEM
  # sp_entity_id: https://mail.example.com      # default {web_protocol}://{web_hostname}
  # auto_provision: true
  # allowed_email_domains: [acme.com]

# SCIM 2.0 provisioning (RFC 7643/7644) under /scim/v2. IdPs create,
# update and deactivate accounts with Authorization: Bearer <token>.
# DELETE deactivates (never hard-deletes); active: false blocks login.
scim:
  enabled: false
  # bearer_token: "<long random secret>"   # required when enabled
