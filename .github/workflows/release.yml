# CamelMailer release pipeline.
#
# Push to main      -> image tags :edge and :sha-<shortsha> (moving, unstable)
# Tag vX.Y.Z        -> full gated release:
#                        1. verify: fmt + clippy + complete test suite
#                           (incl. PostgreSQL RLS integration tests), and
#                           tag == Cargo.toml version == CHANGELOG section
#                        2. multi-arch image :vX.Y.Z + :latest
#                        3. .deb packages (amd64/arm64)
#                        4. GitHub release with the CHANGELOG section as
#                           notes and the .debs attached
#
# `latest` therefore always points to the latest *release*, never to main.
# Cutting a release:
#   1. move the [Unreleased] items in CHANGELOG.md into a new ## [X.Y.Z] section
#   2. bump [workspace.package] version in Cargo.toml (+ cargo update --workspace)
#   3. commit, push, wait for CI
#   4. git tag vX.Y.Z && git push origin vX.Y.Z

name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ------------------------------------------------------------------ gate
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: camelmailer
          POSTGRES_PASSWORD: camelmailer
          POSTGRES_DB: camelmailer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U camelmailer"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CAMELMAILER_TEST_DATABASE_URL: postgres://camelmailer_tests:camelmailer_tests@localhost:5432/camelmailer_test
    steps:
      - uses: actions/checkout@v4

      - name: Release consistency (tag == Cargo version == CHANGELOG)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          echo "tag=$TAG cargo=$CARGO"
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi
          if ! grep -q "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$TAG]' section"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

      # Superusers bypass row-level security — the RLS tests need a plain
      # role (CREATEDB for the throwaway per-test databases).
      - name: Create non-superuser test role
        run: >-
          PGPASSWORD=camelmailer psql -h localhost -U camelmailer -d camelmailer_test
          -c "CREATE ROLE camelmailer_tests LOGIN PASSWORD 'camelmailer_tests' NOSUPERUSER CREATEDB;"
      - run: cargo test --workspace

  # ----------------------------------------------------------- Docker image
  image:
    name: image (${{ matrix.arch }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Native build for this runner's architecture, pushed by digest only;
      # the manifest job below merges both digests into the real tags.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: multi-arch manifest
    needs: image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch tags
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: |
          first_tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          docker buildx imagetools inspect "$first_tag"

  # ----------------------------------------------------------- .deb packages
  deb:
    name: deb (${{ matrix.arch }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build .deb
        run: cargo deb -p camelmailer

      - name: Package contents
        run: dpkg-deb -I target/debian/*.deb && dpkg-deb -c target/debian/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: camelmailer-deb-${{ matrix.arch }}
          path: target/debian/*.deb
          if-no-files-found: error

  # ------------------------------------------------------------ the release
  release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [manifest, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/debs
          pattern: camelmailer-deb-*
          merge-multiple: true

      - name: Extract CHANGELOG section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "::error::empty release notes for $VERSION"
            exit 1
          fi
          {
            echo ""
            echo "---"
            echo "**Images:** \`ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME}\` (amd64 + arm64, also \`:latest\`)"
            echo "**Install:** see the [README](https://github.com/${{ github.repository }}#install) — prebuilt compose, .deb packages below, or from source."
          } >> /tmp/notes.md
          cat /tmp/notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: CamelMailer ${{ github.ref_name }}
          body_path: /tmp/notes.md
          files: /tmp/debs/*.deb
          fail_on_unmatched_files: true
