# CamelMailer CI — lint + full test suite (including the PostgreSQL
# integration tests) + a Docker image build.
#
# NOTE: this workflow becomes active once the camelmailer directory is its
# own repository root (the planned split-out); GitHub only reads workflows
# from the repo root's .github directory.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: camelmailer
          POSTGRES_PASSWORD: camelmailer
          POSTGRES_DB: camelmailer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U camelmailer"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CAMELMAILER_TEST_DATABASE_URL: postgres://camelmailer_tests:camelmailer_tests@localhost:5432/camelmailer_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The bootstrap user of the postgres image is a superuser, and
      # superusers bypass row-level security no matter what — the RLS
      # tests must run as a plain role (CREATEDB for the throwaway
      # per-test databases).
      - name: Create non-superuser test role
        run: >-
          PGPASSWORD=camelmailer psql -h localhost -U camelmailer -d camelmailer_test
          -c "CREATE ROLE camelmailer_tests LOGIN PASSWORD 'camelmailer_tests' NOSUPERUSER CREATEDB;"
      - run: cargo test --workspace

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: camelmailer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
