  /api/v2/admin/organizations/{org}/servers/{server}/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Webhooks]
      summary: Create a webhook
      description: |
        `events` restricts the webhook to the listed event names (an empty
        or omitted list subscribes to everything); an unknown name is a
        `ValidationError` listing the valid ones. `headers` are extra HTTP
        headers (e.g. `Authorization`) set on every delivery request —
        values are treated as secrets and never logged.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookInput" }
      responses:
