openapi: 3.0.3
info:
  title: CamelMailer API
  version: "2"
  description: |
    The CamelMailer HTTP API — transactional email, nothing else.

    Three surfaces, three credentials:

    | Surface | Base path | Auth |
    |---|---|---|
    | **Messaging** (send + read mail, streams, templates, stats) | `/api/v2/server` | `X-Server-API-Key` — an API credential of one mail server |
    | **Management** (organizations, servers, domains, credentials, …) | `/api/v2/admin` | `X-Admin-API-Key` (machine) or `Authorization: Bearer` (user session, RBAC-scoped) |
    | **Accounts** (login, sessions, 2FA, invitations, SSO) | `/api/v2/auth` | none / `Authorization: Bearer` |

    Every response uses the same envelope:

    ```json
    { "status": "success", "time": 0.004, "data": { … } }
    { "status": "error",   "time": 0.004, "error": { "code": "…", "message": "…" } }
    ```

    Error codes worth branching on: `Unauthorized`, `Forbidden`, `NotFound`,
    `ValidationError`, `ParameterMissing`, `InvalidCredentials`, `TOTPRequired`,
    `InvalidTOTPCode`, `AccountLocked`, `InvalidToken`, `SSOError`,
    `WebAuthnDisabled`, `WebAuthnError`, `TwoFactorEnforced` (a session
    without an active second factor touched an organization with
    `require_two_factor: true`; admin API keys are unaffected).
    `InvalidTOTPCode`, `AccountLocked`, `AccountDisabled`, `InvalidToken`,
    `SSOError`.

    **SCIM 2.0 provisioning** (RFC 7643/7644) is a fourth, self-describing
    surface under `/scim/v2` (Users core: `ServiceProviderConfig`,
    `ResourceTypes`, `Schemas`, `Users` CRUD with `filter`/`startIndex`/
    `count`, PATCH `active`). It authenticates with `Authorization: Bearer
    <scim.bearer_token>`, speaks `application/scim+json`, and uses the SCIM
    error format instead of the envelope above — so it is documented in
    docs/authentication.md rather than duplicated in this spec.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://{host}
    variables:
      host:
        default: mail.example.com
        description: Your CamelMailer instance (self-hosted or cloud)
tags:
  - name: Send
  - name: Messages
  - name: Inbound
  - name: Stats
  - name: Streams
  - name: Templates
  - name: DMARC
  - name: Auth
  - name: Organizations
  - name: Servers
  - name: Domains
  - name: Credentials
  - name: Routes
  - name: Webhooks
  - name: Sender addresses
  - name: Suppressions
  - name: People
  - name: Instance

security: []

paths:
  /health:
    get:
      summary: Liveness probe
      description: Unauthenticated; never touches storage.
      responses:
        "200":
          description: Instance is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  version: { type: string, example: "3.3.4" }

  # ---------------------------------------------------------- messaging
  /api/v2/server/:
    get:
      tags: [Send]
      summary: Show the authenticated server
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v2/server/ping:
    get:
      tags: [Send]
      summary: Validate the server API key
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v2/server/messages:
    post:
      tags: [Send]
      summary: Send a message
      description: |
        Queues one message per recipient. The `from` domain must be a
        verified sending domain of the server.
      security: [{ ServerApiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendRequest" }
            example:
              from: "billing@acme.com"
              to: ["ada@example.com"]
              subject: "Your receipt"
              text_body: "Thanks for your purchase."
              tag: "receipt"
      responses:
        "201":
          description: Queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/SendResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
    get:
      tags: [Messages]
      summary: List messages
      security: [{ ServerApiKey: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: per_page, in: query, schema: { type: integer, maximum: 100 } }
        - { name: scope, in: query, schema: { type: string, enum: [incoming, outgoing] } }
        - { name: status, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
        - { name: query, in: query, description: Substring match on subject / addresses, schema: { type: string } }
        - { name: stream, in: query, description: Message-stream permalink, schema: { type: string } }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          messages:
                            type: array
                            items: { $ref: "#/components/schemas/Message" }
                          pagination: { $ref: "#/components/schemas/Pagination" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v2/server/messages/batch:
    post:
      tags: [Send]
      summary: Send a batch of messages
      description: An array of send requests; returns one result per entry.
      security: [{ ServerApiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items: { $ref: "#/components/schemas/SendRequest" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v2/server/messages/with_template:
    post:
      tags: [Send]
      summary: Send using a stored template
      description: |
        Renders the named template (Mustache-style `{{ variables }}`)
        against `template_model`, then sends. Fields set directly
        (e.g. `subject`) override the rendered ones.
      security: [{ ServerApiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/SendRequest"
                - type: object
                  required: [template]
                  properties:
                    template: { type: string, description: Template permalink }
                    template_model: { type: object, additionalProperties: true }
            example:
              from: "hello@acme.com"
              to: ["ada@example.com"]
              template: "welcome"
              template_model: { name: "Ada", product: "Acme" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/v2/server/messages/with_template/batch:
    post:
      tags: [Send]
      summary: Send a template to many recipients (batch)
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v2/server/messages/{id}:
    get:
      tags: [Messages]
      summary: Show a message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v2/server/messages/{id}/deliveries:
    get:
      tags: [Messages]
      summary: Delivery attempts of a message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v2/server/messages/{id}/opens:
    get:
      tags: [Messages]
      summary: Open events of a message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/messages/{id}/clicks:
    get:
      tags: [Messages]
      summary: Click events of a message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/messages/{id}/raw:
    get:
      tags: [Messages]
      summary: Raw RFC 5322 source of a message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v2/server/messages/{id}/share:
    post:
      tags: [Messages]
      summary: Create a public share link for a message
      description: |
        Returns `{ url, expires_at }` where `url` is
        `<frontend_url>/share/m/<token>`. The token is random, shown exactly
        once here, and stored only as a SHA-256 hash. Default expiry 48
        hours, maximum 168 (7 days).
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_hours:
                  type: integer
                  minimum: 1
                  maximum: 168
                  default: 48
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v2/server/messages/{id}/insights:
    get:
      tags: [Messages]
      summary: Deliverability insights for a message
      description: |
        A rule catalog evaluated from the stored message, the server's
        domain configuration and one live DNS lookup. Returns
        `{ generated_at, checks: [{ id, title, status, detail }] }` with
        `status` one of `ok` or `warning`. A check that could not be
        evaluated (e.g. DNS timeout) is skipped — it never fails the
        request.
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v2/share/messages/{token}:
    get:
      tags: [Messages]
      summary: Resolve a public message share link (no auth)
      description: |
        The public counterpart of `POST /api/v2/server/messages/{id}/share`.
        Valid tokens return the message plus deliveries, opens, clicks and
        the decoded `html_body` / `text_body`. Unknown tokens answer
        `404 NotFound`; expired ones `404 ShareLinkExpired`.
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v2/server/inbound:
    get:
      tags: [Inbound]
      summary: Search inbound / held messages
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/inbound/{id}:
    get:
      tags: [Inbound]
      summary: Show an inbound message
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/inbound/{id}/retry:
    post:
      tags: [Inbound]
      summary: Requeue an inbound message for delivery
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/inbound/{id}/bypass:
    post:
      tags: [Inbound]
      summary: Bypass a hold and deliver
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/v2/server/stats:
    get:
      tags: [Stats]
      summary: Message counters
      description: >
        Aggregate counters, optionally restricted to a `created_at` time
        window and/or to messages carrying exactly one `tag`. Includes a
        `bounces` breakdown by category (`hard` / `soft` / `undetermined`).
      security: [{ ServerApiKey: [] }]
      parameters:
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: tag, in: query, description: Scope every counter to messages with this tag, schema: { type: string } }
      responses:
        "200":
          description: Counters
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          stats: { $ref: "#/components/schemas/Stats" }
  /api/v2/server/stats/deliveries:
    get:
      tags: [Stats]
      summary: Delivery/queue statistics
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/bounces:
    get:
      tags: [Stats]
      summary: List bounce messages
      description: >
        Each bounce carries its classification in `bounce_category`
        (`hard` = permanent 5xx failure, `soft` = exhausted 4xx retries,
        `undetermined` = unclassifiable).
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/bounces/{id}:
    get:
      tags: [Stats]
      summary: Show a bounce
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/tags:
    get:
      tags: [Stats]
      summary: List recently used tags
      description: >
        The tags used by the server's messages in the last 30 days, with
        message counts, most used first. Tenant-scoped.
      security: [{ ServerApiKey: [] }]
      responses:
        "200":
          description: Tags with counts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tags:
                            type: array
                            items: { $ref: "#/components/schemas/TagCount" }
  /api/v2/server/logs:
    get:
      tags: [Stats]
      summary: List logged API requests
      description: >
        The server's API request log, newest first. Every authenticated
        request to `/api/v2/server/*` is logged asynchronously with its
        method, path (without the query string), status code, duration and
        a truncated user agent — never bodies, API keys or query strings.
        Entries are retained for 30 days.
      security: [{ ServerApiKey: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1 } }
        - { name: per_page, in: query, schema: { type: integer, maximum: 100 } }
        - { name: status, in: query, description: Status-code class, schema: { type: string, enum: [1xx, 2xx, 3xx, 4xx, 5xx] } }
        - { name: method, in: query, description: Exact HTTP method (case-insensitive), schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Logged requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          requests:
                            type: array
                            items: { $ref: "#/components/schemas/ApiRequest" }
                          pagination: { $ref: "#/components/schemas/Pagination" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/v2/server/streams:
    get:
      tags: [Streams]
      summary: List message streams
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Streams]
      summary: Create a message stream
      security: [{ ServerApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                stream_type: { type: string, enum: [transactional, broadcast] }
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/server/streams/{permalink}:
    get:
      tags: [Streams]
      summary: Show a stream
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    patch:
      tags: [Streams]
      summary: Update a stream
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/streams/{permalink}/archive:
    post:
      tags: [Streams]
      summary: Archive a stream
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/v2/server/templates:
    get:
      tags: [Templates]
      summary: List templates
      security: [{ ServerApiKey: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Templates]
      summary: Create a template
      security: [{ ServerApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TemplateInput" }
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/server/templates/{permalink}:
    get:
      tags: [Templates]
      summary: Show a template
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    patch:
      tags: [Templates]
      summary: Update a template
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TemplateInput" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/templates/{permalink}/archive:
    post:
      tags: [Templates]
      summary: Archive a template
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/server/templates/{permalink}/render:
    post:
      tags: [Templates]
      summary: Render a template against a model (preview)
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/Permalink" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                template_model: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/v2/server/dmarc/summary:
    get:
      tags: [DMARC]
      summary: DMARC compliance summary
      description: >-
        Aggregates the stored DMARC aggregate-report rows: total covered
        messages, pass (DKIM **and** SPF aligned) and fail counts, the
        pass rate, the top 20 sending sources with per-source alignment
        percentages and disposition counts, plus totals per disposition.
        `from`/`to` match reports whose date range overlaps the window.
      security: [{ ServerApiKey: [] }]
      parameters:
        - { name: domain, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Compliance summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          summary: { $ref: "#/components/schemas/DmarcSummary" }
  /api/v2/server/dmarc/reports:
    get:
      tags: [DMARC]
      summary: List stored DMARC aggregate reports
      description: >-
        Reports ingested via an inbound route targeting
        `internal://dmarc-reports`, newest report range first.
      security: [{ ServerApiKey: [] }]
      parameters:
        - { name: domain, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25, maximum: 100 } }
      responses:
        "200":
          description: Report list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reports:
                            type: array
                            items: { $ref: "#/components/schemas/DmarcReport" }
                          pagination: { $ref: "#/components/schemas/Pagination" }
  /api/v2/server/dmarc/reports/{id}:
    get:
      tags: [DMARC]
      summary: Show a DMARC report with its records
      security: [{ ServerApiKey: [] }]
      parameters: [{ $ref: "#/components/parameters/MessageId" }]
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          report: { $ref: "#/components/schemas/DmarcReport" }
                          records:
                            type: array
                            items: { $ref: "#/components/schemas/DmarcRecord" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v2/auth/sender-addresses/confirm:
    post:
      tags: [Sender addresses]
      summary: Confirm a sender address via its verification token
      description: |
        Public — the single-use token from the confirmation email is the
        secret. An unknown or already-used token is an `InvalidToken`
        error (422).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  # --------------------------------------------------------------- auth
  /api/v2/auth/login:
    post:
      tags: [Auth]
      summary: Sign in with email + password (+ optional TOTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email_address, password]
              properties:
                email_address: { type: string, format: email }
                password: { type: string }
                totp_code: { type: string, description: Required when 2FA is enabled }
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          session_token: { type: string }
                          expires_at: { type: string, format: date-time }
                          user: { $ref: "#/components/schemas/User" }
        "401":
          description: InvalidCredentials / TOTPRequired / InvalidTOTPCode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: AccountLocked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/v2/auth/register:
    post:
      tags: [Auth]
      summary: Self-registration (requires auth.allow_registration; signs the new account in)
      description: |
        With `auth.bootstrap_workspace` enabled (meant for the cloud) the
        new account also gets a starter workspace — an organization
        "<FirstName>'s Team" (user as owner), a server `production` and an
        API credential `default` — and the response carries a `workspace`
        object. Its `api_key` is returned **only here, once**. A bootstrap
        failure never fails the registration; the `workspace` key is then
        simply absent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email_address, first_name, last_name, password]
              properties:
                email_address: { type: string, format: email }
                first_name: { type: string }
                last_name: { type: string }
                password: { type: string, description: At least auth.minimum_password_length characters }
      responses:
        "201":
          description: Account created and session issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          session_token: { type: string }
                          expires_at: { type: string, format: date-time }
                          user: { $ref: "#/components/schemas/User" }
                          workspace:
                            type: object
                            description: >-
                              Only with auth.bootstrap_workspace, and only
                              when the bootstrap succeeded.
                            properties:
                              organization: { type: string, description: Organization permalink }
                              server: { type: string, description: Server permalink }
                              api_key: { type: string, description: The API credential's key — shown exactly once, here }
        "403":
          description: RegistrationDisabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: ValidationError (invalid email, weak password, or address already taken)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/v2/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/me:
    get:
      tags: [Auth]
      summary: Current user + memberships
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    patch:
      tags: [Auth]
      summary: Update profile
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/password:
    post:
      tags: [Auth]
      summary: Change password (revokes all sessions, returns a fresh token)
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/password-reset:
    post:
      tags: [Auth]
      summary: Request a password reset (identical response for unknown addresses)
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/password-reset/complete:
    post:
      tags: [Auth]
      summary: Redeem a reset token
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v2/auth/totp/enroll:
    post:
      tags: [Auth]
      summary: Start TOTP enrollment (returns secret + otpauth URL)
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/totp/activate:
    post:
      tags: [Auth]
      summary: Confirm TOTP with a code — 2FA is enforced from here on
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/totp/disable:
    post:
      tags: [Auth]
      summary: Disable TOTP (requires the password)
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/invitations/{token}:
    get:
      tags: [Auth]
      summary: Preview an invitation (public)
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v2/auth/invitations/accept:
    post:
      tags: [Auth]
      summary: Accept an invitation (creates the account when new)
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v2/auth/oidc/start:
    get:
      tags: [Auth]
      summary: Begin OIDC SSO (redirect, or JSON with Accept application/json)
      responses:
        "307": { description: Redirect to the identity provider }
        "200": { $ref: "#/components/responses/Success" }
        "404": { description: SSODisabled }
  /api/v2/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC redirect URI (completes SSO)
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "307": { description: Redirect to the frontend with the token in the fragment }
  /api/v2/auth/features:
    get:
      tags: [Auth]
      summary: Feature discovery for login/registration pages (public; sso providers as {id, name, type}, never secrets)
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/auth/sso/{id}/start:
    get:
      tags: [Auth]
      summary: Begin social sign-in with a configured provider (redirect, or JSON with Accept application/json)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: Provider id from auth.sso_providers }
      responses:
        "307": { description: Redirect to the provider }
        "200": { $ref: "#/components/responses/Success" }
        "404": { description: SSOProviderNotFound }
  /api/v2/auth/sso/{id}/callback:
    get:
      tags: [Auth]
      summary: Social sign-in redirect URI (completes the login; 422 SSOEmailUnavailable without a verified email)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: Provider id from auth.sso_providers }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "307": { description: Redirect to the frontend with the token in the fragment }
        "404": { description: SSOProviderNotFound }
        "422": { $ref: "#/components/responses/ValidationError" }
      summary: Which optional sign-in features this instance exposes (public)
      description: |
        Lets login pages decide what to render — the passkey button, the
        sign-up link and the SSO button.
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          webauthn: { type: boolean }
                          registration: { type: boolean }
                          oidc:
                            type: object
                            properties:
                              enabled: { type: boolean }
                              name: { type: string }
  /api/v2/auth/webauthn/register/start:
    post:
      tags: [Auth]
      summary: Begin passkey registration (returns WebAuthn creation options)
      description: |
        The response `data` is the JSON form of a WebAuthn
        `CredentialCreationOptions` (`{ "publicKey": { … } }`, binary
        fields as unpadded base64url) — pass it to
        `navigator.credentials.create()`. Already-registered passkeys are
        listed in `excludeCredentials`. `403 WebAuthnDisabled` while
        `auth.webauthn` is off.
      security: [{ SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { description: WebAuthnDisabled }
  /api/v2/auth/webauthn/register/finish:
    post:
      tags: [Auth]
      summary: Store the new passkey
      security: [{ SessionToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, credential]
              properties:
                name: { type: string, description: "Display label, e.g. \"MacBook Touch ID\"" }
                credential:
                  type: object
                  description: The JSON-serialized result of navigator.credentials.create()
      responses:
        "201":
          description: Passkey stored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          credential: { $ref: "#/components/schemas/PasskeyCredential" }
        "403": { description: WebAuthnDisabled }
        "422": { description: WebAuthnError (invalid attestation or expired challenge) }
  /api/v2/auth/webauthn/credentials:
    get:
      tags: [Auth]
      summary: List the caller's passkeys
      security: [{ SessionToken: [] }]
      responses:
        "200":
          description: Passkeys (never includes key material)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          credentials:
                            type: array
                            items: { $ref: "#/components/schemas/PasskeyCredential" }
        "403": { description: WebAuthnDisabled }
  /api/v2/auth/webauthn/credentials/{id}:
    delete:
      tags: [Auth]
      summary: Delete one of the caller's passkeys
      description: |
        Requires a valid session. The password always remains as a login
        factor, so even the last passkey may be deleted.
      security: [{ SessionToken: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { description: WebAuthnDisabled }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v2/auth/webauthn/login/start:
    post:
      tags: [Auth]
      summary: Begin a passkey login (returns WebAuthn request options)
      description: |
        The response `data` is the JSON form of a WebAuthn
        `CredentialRequestOptions` — pass it to
        `navigator.credentials.get()`. Unknown addresses receive the same
        generic response shape (with deterministic fake credential ids),
        so the endpoint cannot be used to enumerate accounts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email_address]
              properties:
                email_address: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403": { description: WebAuthnDisabled }
  /api/v2/auth/webauthn/login/finish:
    post:
      tags: [Auth]
      summary: Complete a passkey login (issues a session like /login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: object
                  description: The JSON-serialized result of navigator.credentials.get()
      responses:
        "201":
          description: Session created — same structure as a password login
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          session_token: { type: string }
                          expires_at: { type: string, format: date-time }
                          user: { $ref: "#/components/schemas/User" }
        "401":
          description: InvalidCredentials (generic for every failure mode)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403": { description: WebAuthnDisabled / AccountLocked }
  /api/v2/auth/saml/metadata:
    get:
      tags: [Auth]
      summary: SAML SP metadata XML (entity id + ACS, for IdP registration)
      responses:
        "200":
          description: SP metadata
          content:
            application/samlmetadata+xml:
              schema: { type: string }
        "404": { description: SAMLDisabled }
  /api/v2/auth/saml/start:
    get:
      tags: [Auth]
      summary: Begin SAML SSO (redirect with SAMLRequest, or JSON with Accept application/json)
      responses:
        "307": { description: Redirect to the IdP single-sign-on URL }
        "200": { $ref: "#/components/responses/Success" }
        "404": { description: SAMLDisabled }
  /api/v2/auth/saml/acs:
    post:
      tags: [Auth]
      summary: SAML assertion consumer service (the IdP posts the signed response here)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse]
              properties:
                SAMLResponse: { type: string, description: base64-encoded SAML response }
                RelayState: { type: string }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "307": { description: Redirect to the frontend with the token in the fragment }
        "422": { description: "SSOError — the response failed validation (signature, audience, InResponseTo, validity window, or replay)" }
        "404": { description: SAMLDisabled }

  # ------------------------------------------------------------- admin
  /api/v2/admin/organizations:
    get:
      tags: [Organizations]
      summary: List organizations (users see their memberships)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Organizations]
      summary: Create an organization (a user creator becomes its owner)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}:
    get:
      tags: [Organizations]
      summary: Show an organization (includes require_two_factor)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    patch:
      tags: [Organizations]
      summary: Update an organization (owner)
      description: |
        Currently the one mutable setting is `require_two_factor` — org-wide
        2FA enforcement: while on, users without an active second factor
        (TOTP or a passkey) get `403 TwoFactorEnforced` on every resource of
        this organization when using a session. Admin API keys are
        unaffected; global admin sessions are enforced too.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [require_two_factor]
              properties:
                require_two_factor: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "403":
          description: Forbidden (not an owner) / TwoFactorEnforced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    delete:
      tags: [Organizations]
      summary: Delete an organization (owner)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/members:
    get:
      tags: [People]
      summary: List members
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [People]
      summary: Add an existing account as a member (admin)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/members/{user_id}:
    patch:
      tags: [People]
      summary: Change a member's role (owner transitions need an owner)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { name: user_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    delete:
      tags: [People]
      summary: Remove a member (the last owner is immovable)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { name: user_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/invitations:
    get:
      tags: [People]
      summary: List invitations
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [People]
      summary: Invite by email (invite token returned exactly once)
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/invitations/{id}:
    delete:
      tags: [People]
      summary: Revoke an invitation
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/v2/admin/organizations/{org}/billing:
    get:
      tags: [Organizations]
      summary: Billing status of an organization (admin)
      description: |
        Hosted cloud only. Always `200` for authorized callers:
        `{ enabled: false, has_customer: false }` on installations without
        billing (the default for self-hosted) — the dashboard hides all
        billing UI in that case.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled: { type: boolean }
                          has_customer: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v2/admin/organizations/{org}/billing/portal:
    post:
      tags: [Organizations]
      summary: Open the Stripe billing portal (admin)
      description: |
        Creates the Stripe customer for the organization on first use
        (idempotent — an existing customer is reused, the customer id is
        persisted only after Stripe reported success) and returns the URL
        of a fresh billing-portal session. `403 BillingDisabled` when the
        `billing` config group is off (self-hosted); `502
        BillingUnavailable` when Stripe cannot be reached (details are
        logged, never forwarded).
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200":
          description: Portal session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url: { type: string, example: "https://billing.stripe.com/p/session/…" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Billing is not enabled on this installation (`BillingDisabled`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: The billing provider is unavailable (`BillingUnavailable`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v2/admin/organizations/{org}/servers:
    get:
      tags: [Servers]
      summary: List mail servers
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Servers]
      summary: Create a mail server
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters: [{ $ref: "#/components/parameters/Org" }]
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}:
    get:
      tags: [Servers]
      summary: Show a server
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    patch:
      tags: [Servers]
      summary: Update server settings
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    delete:
      tags: [Servers]
      summary: Delete a server
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}/suspend:
    post:
      tags: [Servers]
      summary: Suspend sending
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}/unsuspend:
    post:
      tags: [Servers]
      summary: Lift a suspension
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
