  /api/v2/admin/organizations/{org}/servers/{server}/templates/{permalink}/copy_to:
    post:
      tags: [Templates]
      summary: Copy a template to another server of the same organization
      description: |
        Copies the template to the server named by `target_server` (a
        server permalink of the SAME organization — anything else is a
        404). If the permalink already exists on the target, the request
        is a `ValidationError` (422) unless `overwrite: true` is passed.
        Requires the `member` role or above.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { $ref: "#/components/parameters/Permalink" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_server]
              properties:
                target_server:
                  type: string
                  description: Permalink of the target server (same organization)
                overwrite:
                  type: boolean
                  default: false
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "200": { $ref: "#/components/responses/Success" }

