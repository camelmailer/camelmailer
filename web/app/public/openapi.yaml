        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}/ip_pool:
    post:
      tags: [Servers]
      summary: Assign an IP pool
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/v2/admin/organizations/{org}/servers/{server}/domains:
    get:
      tags: [Domains]
      summary: List sending domains
      description: >-
        Each domain carries the three DNS records to publish:
        `verification_record` (ownership challenge at
        `_camelmailer-challenge.<domain>`), `spf_record` and `dkim_record`
        (`<selector>._domainkey.<domain>`; the domain's own key when it has
        one, the installation key otherwise). The DKIM private key is never
        returned.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Domains]
      summary: Add a sending domain
      description: >-
        Generates a dedicated RSA-2048 DKIM key for the domain and a stable
        verification token. The response includes `verification_record`,
        `spf_record` and `dkim_record` ready to publish.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: mail.acme.com }
      responses:
        "201": { $ref: "#/components/responses/Success" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api/v2/admin/organizations/{org}/servers/{server}/domains/{name}:
    get:
      tags: [Domains]
      summary: Show a domain
      description: >-
        Includes `verification_record`, `spf_record` and `dkim_record`
        (see the list endpoint).
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    delete:
      tags: [Domains]
      summary: Delete a domain
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}/domains/{name}/verify:
    post:
      tags: [Domains]
      summary: Verify a domain via DNS
      description: >-
        Looks up the TXT records at `_camelmailer-challenge.<domain>` and
        marks the domain verified when one of them equals
        `camelmailer-verification=<token>` (published as
        `verification_record` by the domain endpoints). When the record is
        missing — or the lookup fails — the response is a 422
        `ValidationError` whose message names the exact record to publish.
        Operator escape hatch: callers authenticated with the
        `X-Admin-API-Key` machine key (never a user session) may skip the
        DNS check by sending `{"force": true}`; user sessions sending
        `force` get a 403 `Forbidden`.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { name: name, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Skip the DNS check (X-Admin-API-Key only).
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/v2/admin/organizations/{org}/servers/{server}/domains/{name}/health:
    get:
      tags: [DMARC]
      summary: Live DNS health check of a sending domain
      description: >-
        Resolves the domain's SPF record, the DKIM record at
        `<selector>._domainkey.<domain>` and the DMARC record at
        `_dmarc.<domain>` live, and grades each check `ok`, `warning` or
        `missing` (with the found records, the expected value and the
        concrete problems). The response carries the overall traffic
        light, the recommended next step of the policy journey
        (no DMARC -> publish p=none with rua; p=none with high compliance
        on recent reports -> p=quarantine; p=quarantine with high
        compliance -> p=reject), the server's RUA address (when an
        inbound route targets `internal://dmarc-reports`) and the stored
        compliance figures of the last 30 days.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Health report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          health: { $ref: "#/components/schemas/DomainHealth" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v2/admin/organizations/{org}/servers/{server}/credentials:
    get:
      tags: [Credentials]
      summary: List credentials
      description: >
        Each credential includes `last_used_at` — the last time it
        authenticated a request (API-key auth on the messaging API or
        SMTP AUTH); null if never used.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
