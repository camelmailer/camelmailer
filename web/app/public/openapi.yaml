components:
  securitySchemes:
    ServerApiKey:
      type: apiKey
      in: header
      name: X-Server-API-Key
      description: An API credential of one mail server.
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-API-Key
      description: A machine key with full management access.
    SessionToken:
      type: http
      scheme: bearer
      description: A user session from /api/v2/auth/login (RBAC-scoped).

  parameters:
    MessageId:
      name: id
      in: path
      required: true
      schema: { type: integer }
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    Permalink:
      name: permalink
      in: path
      required: true
      schema: { type: string }
    Org:
      name: org
      in: path
      required: true
      description: Organization permalink
      schema: { type: string }
    ServerPermalink:
      name: server
      in: path
      required: true
      description: Server permalink
      schema: { type: string }

  responses:
    Success:
      description: Success envelope; see the endpoint description for the data shape.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SuccessEnvelope" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ValidationError:
      description: The request was understood but invalid
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    SuccessEnvelope:
      type: object
      required: [status, time]
      properties:
        status: { type: string, enum: [success] }
        time: { type: number, description: Server-side processing seconds }
        data: { type: object, additionalProperties: true }
    ErrorEnvelope:
      type: object
      required: [status, time, error]
      properties:
        status: { type: string, enum: [error] }
        time: { type: number }
        error:
          type: object
          properties:
            code: { type: string, example: ValidationError }
            message: { type: string }

    Address:
      description: Either a bare email string or an object with a display name.
      oneOf:
        - type: string
          format: email
        - type: object
          required: [email]
          properties:
            email: { type: string, format: email }
            name: { type: string }

    Attachment:
      type: object
      required: [name, content_type, data_base64]
      properties:
        name: { type: string, example: invoice.pdf }
        content_type: { type: string, example: application/pdf }
        data_base64: { type: string, description: Base64-encoded content }

    SendRequest:
      type: object
      required: [from, to]
      properties:
        from: { $ref: "#/components/schemas/Address" }
        to:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        cc:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        bcc:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        reply_to:
          type: array
          items: { $ref: "#/components/schemas/Address" }
        subject: { type: string }
        html_body: { type: string }
        text_body: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        tag: { type: string, description: Free-form tag for filtering/stats }
        metadata: { type: object, additionalProperties: true }
        stream: { type: string, description: Message-stream permalink (defaults to the server's default stream) }

    SendResult:
      type: object
      properties:
        message_id: { type: integer }
        recipients:
          type: array
          items:
            type: object
            properties:
              rcpt_to: { type: string }
              status: { type: string, example: queued }
              token: { type: string }

    Message:
      type: object
      properties:
        id: { type: integer }
        token: { type: string }
        scope: { type: string, enum: [incoming, outgoing] }
        rcpt_to: { type: string }
        mail_from: { type: string, nullable: true }
        subject: { type: string, nullable: true }
        message_id: { type: string, nullable: true }
        tag: { type: string, nullable: true }
        status: { type: string, nullable: true, example: Sent }
        bounce: { type: boolean }
        bounce_category:
          type: string
          nullable: true
          enum: [hard, soft, undetermined]
          description: >
            Bounce classification, set when the message terminally failed
            or was processed as an inbound bounce (DSN); null otherwise.
        spam_status: { type: string, nullable: true }
        spam_score: { type: number, nullable: true }
        held: { type: boolean }
        threat: { type: boolean }
        size: { type: integer, nullable: true }
        metadata: { type: object, nullable: true, additionalProperties: true }
        stream_id: { type: integer, nullable: true }
        bypassed: { type: boolean }
        created_at: { type: string, format: date-time }

    Stats:
      type: object
      properties:
        total: { type: integer }
        incoming: { type: integer }
        outgoing: { type: integer }
        sent: { type: integer }
        pending: { type: integer }
        held: { type: integer }
        bounced: { type: integer }
        soft_fail: { type: integer }
        hard_fail: { type: integer }
        opens: { type: integer }
        clicks: { type: integer }
        unique_opens: { type: integer }
        unique_clicks: { type: integer }
        bounces:
          type: object
          description: Bounce breakdown by classification.
          properties:
            hard: { type: integer }
            soft: { type: integer }
            undetermined: { type: integer }

    TagCount:
      type: object
      properties:
        tag: { type: string, example: welcome }
        count: { type: integer, description: Messages carrying the tag in the last 30 days }

    ApiRequest:
      type: object
      description: One logged API request (metadata only — no bodies, keys or query strings).
      properties:
        id: { type: integer }
        method: { type: string, example: GET }
        path: { type: string, example: /api/v2/server/messages }
        status_code: { type: integer, example: 200 }
        duration_ms: { type: integer }
        user_agent: { type: string, nullable: true, description: Truncated to 255 characters }
        created_at: { type: string, format: date-time }

    TemplateInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        subject: { type: string, description: "May contain {{ variables }}" }
        html_body: { type: string }
        text_body: { type: string }

    WebhookInput:
      type: object
      properties:
        name: { type: string }
        url: { type: string, format: uri }
        sign: { type: boolean, default: true, description: RSA-sign delivery payloads }
        enabled: { type: boolean, description: Update only }
        events:
          type: array
          description: Subscribed event names; empty = all events.
          items:
            type: string
            enum: [MessageSent, MessageDelayed, MessageDeliveryFailed, MessageHeld]
        headers:
          type: object
          description: |
            Extra HTTP headers set on every delivery request (e.g.
            Authorization). Values are secrets — never logged.
          additionalProperties: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        uuid: { type: string }
        email_address: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        admin: { type: boolean }

    PasskeyCredential:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
    DmarcReport:
      type: object
      properties:
        id: { type: integer }
        domain: { type: string, example: example.com }
        org_name: { type: string, nullable: true, example: google.com }
        org_email: { type: string, nullable: true }
        report_id: { type: string, description: The reporter's report id }
        date_range_begin: { type: string, format: date-time }
        date_range_end: { type: string, format: date-time }
        received_at: { type: string, format: date-time }
        record_count: { type: integer }

    DmarcRecord:
      type: object
      properties:
        id: { type: integer }
        source_ip: { type: string, example: 203.0.113.10 }
        count: { type: integer }
        disposition: { type: string, enum: [none, quarantine, reject] }
        dkim_result: { type: string, nullable: true, example: pass }
        spf_result: { type: string, nullable: true, example: softfail }
        dkim_aligned: { type: boolean }
        spf_aligned: { type: boolean }
        header_from: { type: string, nullable: true }
        envelope_from: { type: string, nullable: true }

    DmarcSummary:
      type: object
      properties:
        total: { type: integer, description: Messages covered by the reports }
        pass: { type: integer, description: Messages with DKIM and SPF aligned }
        fail: { type: integer }
        pass_rate: { type: number, description: pass / total (0.0-1.0) }
        by_source:
          type: array
          description: Top 20 sending sources by volume
          items:
            type: object
            properties:
              source_ip: { type: string }
              count: { type: integer }
              spf_aligned_pct: { type: number }
              dkim_aligned_pct: { type: number }
              disposition_counts:
                type: object
                additionalProperties: { type: integer }
        by_disposition:
          type: object
          additionalProperties: { type: integer }

    DomainHealthCheck:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, missing] }
        record_name: { type: string }
        found:
          type: array
          items: { type: string }
        expected: { type: string, nullable: true }
        problems:
          type: array
          items: { type: string }

    DomainHealth:
      type: object
      properties:
        domain: { type: string }
        checks:
          type: object
          properties:
            spf: { $ref: "#/components/schemas/DomainHealthCheck" }
            dkim: { $ref: "#/components/schemas/DomainHealthCheck" }
            dmarc:
              allOf:
                - $ref: "#/components/schemas/DomainHealthCheck"
                - type: object
                  properties:
                    policy:
                      type: object
                      nullable: true
                      properties:
                        p: { type: string, nullable: true }
                        sp: { type: string, nullable: true }
                        rua:
                          type: array
                          items: { type: string }
                        pct: { type: integer }
        overall: { type: string, enum: [ok, warning, missing] }
        next_step: { type: string }
        rua_address: { type: string, nullable: true }
        compliance:
          type: object
          nullable: true
          properties:
            window_days: { type: integer }
            total: { type: integer }
            pass: { type: integer }
            pass_rate: { type: number }

    Pagination:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        total_pages: { type: integer }
