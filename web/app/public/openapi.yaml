  /api/v2/admin/organizations/{org}/servers/{server}/webhooks/{id}/test:
    post:
      tags: [Webhooks]
      summary: Send a test event to a webhook
      description: |
        Synchronously delivers one sample payload for the chosen event to
        the webhook URL — custom headers and the RSA signature exactly as
        the worker sends them; the payload carries `"test": true`. The
        response reports `{ delivered, status_code, duration_ms, error? }`
        (10-second timeout; nothing is queued, retried or logged).
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  enum: [MessageSent, MessageDelayed, MessageDeliveryFailed, MessageHeld]
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

