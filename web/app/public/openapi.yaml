        - { $ref: "#/components/parameters/ServerPermalink" }
      responses:
        "200": { $ref: "#/components/responses/Success" }
    post:
      tags: [Sender addresses]
      summary: Add a sender address (sends a confirmation email)
      description: |
        Adds a single sender address in `pending` state and generates a
        verification token (stored hashed). When platform mail (`app_mail`)
        is enabled, a confirmation link
        (`{frontend_url}/sender-addresses/confirm?token=…`) is emailed to
        exactly this address; otherwise the response carries the token
        once, as `verification_token`, for the operator to relay.
      security: [{ AdminApiKey: [] }, { SessionToken: [] }]
      parameters:
        - { $ref: "#/components/parameters/Org" }
        - { $ref: "#/components/parameters/ServerPermalink" }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "201": { $ref: "#/components/responses/Success" }
  /api/v2/admin/organizations/{org}/servers/{server}/sender_addresses/{id}:
